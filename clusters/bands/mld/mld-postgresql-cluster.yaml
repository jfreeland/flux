apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mld-db
  namespace: mld
  finalizers:
    - do-not-delete
spec:
  instances: 2
  superuserSecret:
    name: mld-db-superuser
  bootstrap:
    initdb:
      database: mld
      owner: mld
      secret:
        name: mld-db-user
  storage:
    size: 10Gi
    storageClass: local-path
  monitoring:
    enablePodMonitor: true
  priorityClassName: high-priority
