apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mldegrees-ingress
  namespace: mld
spec:
  ingressClassName: cloudflare-tunnel-f6d
  rules:
    #- host: mldegrees.com
    #  http:
    #    paths:
    #      - path: /api
    #        pathType: Prefix
    #        backend:
    #          service:
    #            name: backend-service
    #            port:
    #              number: 8080
    #      - path: /
    #        pathType: Prefix
    #        backend:
    #          service:
    #            name: frontend-service
    #            port:
    #              number: 80
    - host: www.machinelearningdegrees.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
