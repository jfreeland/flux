---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: nginx
  namespace: flux-system
spec:
  interval: 5m0s
  url: oci://registry-1.docker.io/bitnamicharts/nginx
  ref:
    tag: 1.28.0
---
#name: cloudflare-tunnel-f6d
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: flux-system
spec:
  releaseName: nginx
  targetNamespace: default
  chartRef:
    kind: OCIRepository
    name: nginx
    namespace: flux-system
  interval: 5m
  values:
    ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
    hostAliases: []
    tls:
      enabled: false
      autoGenerated: true
    ingress:
      enabled: true
      ## @param ingress.selfSigned Create a TLS secret for this ingress record using self-signed certificates generated by Helm
      ##
      selfSigned: false
      pathType: ImplementationSpecific
      apiVersion: ""
      hostname: demo.f6d.dev
      path: /
      annotations: {}
      ingressClassName: cloudflare-tunnel-f6d
      ## @param ingress.tls Create TLS Secret
      ## TLS certificates will be retrieved from a TLS secret with name: {{- printf "%s-tls" .Values.ingress.hostname }}
      ## You can use the ingress.secrets parameter to create this TLS secret or relay on cert-manager to create it
      ##
      tls: false
      ## @param ingress.tlsWwwPrefix Adds www subdomain to default cert
      ## Creates tls host with ingress.hostname: {{ print "www.%s" .Values.ingress.hostname }}
      ## Is enabled if "nginx.ingress.kubernetes.io/from-to-www-redirect" is "true"
      tlsWwwPrefix: false
